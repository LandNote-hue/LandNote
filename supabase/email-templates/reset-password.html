<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LandNote 비밀번호 재설정</title>
</head>
<body style="margin:0;padding:0;background-color:#F1F5F9;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#F1F5F9;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:520px;background-color:#FFFFFF;border-radius:12px;overflow:hidden;border:1px solid #E2E8F0;">
          <tr>
            <td style="background:linear-gradient(135deg,#C8102E 0%,#A00E25 100%);padding:28px 32px;text-align:center;">
              <div style="font-size:22px;font-weight:800;color:#FFFFFF;letter-spacing:-0.02em;">LandNote</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.75);margin-top:6px;letter-spacing:0.06em;">부동산 매물관리 시스템</div>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 32px 24px;">
              <h1 style="margin:0 0 16px;font-size:20px;font-weight:700;color:#0F172A;line-height:1.4;">
                비밀번호를 재설정해 주세요
              </h1>
              <p style="margin:0 0 12px;font-size:15px;color:#475569;line-height:1.65;">
                <strong style="color:#0F172A;">{{ .Email }}</strong> 계정의 비밀번호 재설정 요청이 접수되었습니다.
              </p>
              <p style="margin:0 0 24px;font-size:15px;color:#475569;line-height:1.65;">
                아래 버튼을 눌러 새 비밀번호를 설정해 주세요. 본인이 요청하지 않았다면 이 메일은 무시하셔도 됩니다.
              </p>
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 auto 24px;">
                <tr>
                  <td align="center" style="border-radius:10px;background-color:#C8102E;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" rel="noopener noreferrer"
                      style="display:inline-block;padding:14px 32px;font-size:15px;font-weight:700;color:#FFFFFF;text-decoration:none;border-radius:10px;">
                      비밀번호 재설정하기
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-size:12px;color:#94A3B8;line-height:1.55;">
                버튼이 동작하지 않으면 아래 주소를 복사해 브라우저에 붙여 넣으세요.<br />
                <span style="word-break:break-all;color:#64748B;">{{ .ConfirmationURL }}</span>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px 28px;border-top:1px solid #E2E8F0;">
              <p style="margin:0;font-size:12px;color:#94A3B8;line-height:1.5;text-align:center;">
                LandNote 랜드노트 · 본 메일은 발신 전용입니다.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
